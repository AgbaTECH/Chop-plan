openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Chop Plan API - prepaid lunch subscription service for Lagos restaurants
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication for users and vendors
  - name: vendors
    description: Vendor browsing for users
  - name: user
    description: User profile and subscriptions
  - name: vendor
    description: Vendor dashboard and management
  - name: blog
    description: Blog posts
  - name: contact
    description: Contact form
  - name: admin
    description: Admin dashboard - manage vendors, customers and view analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── AUTH ──────────────────────────────────────────────────────────────────
  /auth/user/signup:
    post:
      operationId: userSignup
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSignupInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/user/login:
    post:
      operationId: userLogin
      tags: [auth]
      summary: Login as a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/vendor/signup:
    post:
      operationId: vendorSignup
      tags: [auth]
      summary: Register a new vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorSignupInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/vendor/login:
    post:
      operationId: vendorLogin
      tags: [auth]
      summary: Login as a vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/admin/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Login as an admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user or vendor
      responses:
        "200":
          description: Current session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── VENDORS (public browsing) ─────────────────────────────────────────────
  /vendors:
    get:
      operationId: listVendors
      tags: [vendors]
      summary: List all vendors, optionally filtered by area/location
      parameters:
        - name: area
          in: query
          schema:
            type: string
          description: Lagos area/neighborhood filter (e.g. Lekki, VI, Ikeja)
        - name: search
          in: query
          schema:
            type: string
          description: Search by vendor name or cuisine
      responses:
        "200":
          description: List of vendors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"

  /vendors/{vendorId}:
    get:
      operationId: getVendor
      tags: [vendors]
      summary: Get a single vendor profile
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vendor detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vendors/{vendorId}/meals:
    get:
      operationId: listVendorMeals
      tags: [vendors]
      summary: Get meals offered by a vendor
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of meals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Meal"

  /vendors/{vendorId}/plans:
    get:
      operationId: listVendorPlans
      tags: [vendors]
      summary: Get subscription plans for a vendor
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Subscription plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubscriptionPlan"

  /vendors/areas:
    get:
      operationId: listAreas
      tags: [vendors]
      summary: List all Lagos areas that have vendors
      responses:
        "200":
          description: Unique area list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  # ── USER dashboard ────────────────────────────────────────────────────────
  /user/profile:
    get:
      operationId: getUserProfile
      tags: [user]
      summary: Get logged-in user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateUserProfile
      tags: [user]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /user/subscriptions:
    get:
      operationId: listUserSubscriptions
      tags: [user]
      summary: Get the user's active subscriptions
      responses:
        "200":
          description: Subscriptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserSubscription"
    post:
      operationId: createSubscription
      tags: [user]
      summary: Subscribe to a vendor plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSubscription"

  /user/subscriptions/{subscriptionId}:
    delete:
      operationId: cancelSubscription
      tags: [user]
      summary: Cancel a subscription
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /user/subscriptions/{subscriptionId}/schedule:
    get:
      operationId: getUserSubscriptionSchedule
      tags: [user]
      summary: Get the daily pickup schedule for a subscription
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Schedule days
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduleDay"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/subscriptions/{subscriptionId}/schedule/{dayId}/confirm:
    post:
      operationId: confirmPickup
      tags: [user]
      summary: Confirm a day's pickup was received
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: integer
        - name: dayId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleDay"
        "400":
          description: Cannot confirm this day
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── VENDOR dashboard ──────────────────────────────────────────────────────
  /vendor/profile:
    get:
      operationId: getVendorProfile
      tags: [vendor]
      summary: Get logged-in vendor profile
      responses:
        "200":
          description: Vendor profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorProfile"
    patch:
      operationId: updateVendorProfile
      tags: [vendor]
      summary: Update vendor profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorProfileUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorProfile"

  /vendor/dashboard:
    get:
      operationId: getVendorDashboard
      tags: [vendor]
      summary: Get vendor dashboard summary (subscribers, earnings, meals)
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorDashboard"

  /vendor/customers:
    get:
      operationId: listVendorCustomers
      tags: [vendor]
      summary: List vendor's subscribed customers
      responses:
        "200":
          description: Customer list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VendorCustomer"

  /vendor/earnings:
    get:
      operationId: getVendorEarnings
      tags: [vendor]
      summary: Get projected weekly and monthly earnings breakdown
      responses:
        "200":
          description: Earnings data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorEarnings"

  /vendor/meals:
    get:
      operationId: listMyMeals
      tags: [vendor]
      summary: Get vendor's own meal listings
      responses:
        "200":
          description: Meal list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Meal"
    post:
      operationId: createMeal
      tags: [vendor]
      summary: Add a new meal to the menu
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MealInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meal"

  /vendor/meals/{mealId}:
    patch:
      operationId: updateMeal
      tags: [vendor]
      summary: Update a meal
      parameters:
        - name: mealId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MealUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meal"
    delete:
      operationId: deleteMeal
      tags: [vendor]
      summary: Delete a meal
      parameters:
        - name: mealId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /vendor/customers/{subscriptionId}/schedule:
    get:
      operationId: getVendorCustomerSchedule
      tags: [vendor]
      summary: Get the daily pickup schedule for one of the vendor's subscribers
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Schedule days
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduleDay"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vendor/wallet:
    get:
      operationId: getVendorWallet
      tags: [vendor]
      summary: Get vendor wallet balance and withdrawal history
      responses:
        "200":
          description: Wallet summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorWallet"

  /vendor/wallet/withdraw:
    post:
      operationId: withdrawFromWallet
      tags: [vendor]
      summary: Withdraw available funds from the wallet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawInput"
      responses:
        "200":
          description: Updated wallet summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorWallet"
        "400":
          description: Invalid withdrawal amount
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── ADMIN ────────────────────────────────────────────────────────────────
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get platform-wide analytics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/vendors:
    get:
      operationId: listAdminVendors
      tags: [admin]
      summary: List all vendors
      responses:
        "200":
          description: Vendors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminVendor"
    post:
      operationId: createAdminVendor
      tags: [admin]
      summary: Add a new vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminVendorInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminVendor"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/vendors/{vendorId}:
    delete:
      operationId: deleteAdminVendor
      tags: [admin]
      summary: Delete a vendor
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/customers:
    get:
      operationId: listAdminCustomers
      tags: [admin]
      summary: List all customers
      responses:
        "200":
          description: Customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminCustomer"
    post:
      operationId: createAdminCustomer
      tags: [admin]
      summary: Add a new customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCustomerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminCustomer"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/customers/{userId}:
    delete:
      operationId: deleteAdminCustomer
      tags: [admin]
      summary: Delete a customer
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ── BLOG ─────────────────────────────────────────────────────────────────
  /blog/posts:
    get:
      operationId: listBlogPosts
      tags: [blog]
      summary: List published blog posts
      responses:
        "200":
          description: Blog posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogPost"

  /blog/posts/{postId}:
    get:
      operationId: getBlogPost
      tags: [blog]
      summary: Get a single blog post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── CONTACT ───────────────────────────────────────────────────────────────
  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit a contact or support message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    # ── Auth ──────────────────────────────────────────────────────────────
    UserSignupInput:
      type: object
      required: [name, email, password, phone, area]
      properties:
        name:
          type: string
        email:
          type: string

        password:
          type: string
          minLength: 6
        phone:
          type: string
        area:
          type: string
          description: Lagos area/neighborhood

    VendorSignupInput:
      type: object
      required: [businessName, ownerName, email, password, phone, area, cuisineType]
      properties:
        businessName:
          type: string
        ownerName:
          type: string
        email:
          type: string

        password:
          type: string
          minLength: 6
        phone:
          type: string
        area:
          type: string
        cuisineType:
          type: string
        description:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string

        password:
          type: string

    AuthResponse:
      type: object
      required: [token, role, id, name, email]
      properties:
        token:
          type: string
        role:
          type: string
          enum: [user, vendor, admin]
        id:
          type: integer
        name:
          type: string
        email:
          type: string

    MeResponse:
      type: object
      required: [id, name, email, role]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, vendor, admin]
        area:
          type: ["string", "null"]

    # ── Vendors (public) ──────────────────────────────────────────────────
    Vendor:
      type: object
      required: [id, businessName, area, cuisineType, coverImage, rating, subscriberCount, lowestPlanPrice]
      properties:
        id:
          type: integer
        businessName:
          type: string
        area:
          type: string
        cuisineType:
          type: string
        coverImage:
          type: string
        rating:
          type: number
        subscriberCount:
          type: integer
        lowestPlanPrice:
          type: integer
          description: Lowest monthly plan price in Naira
        description:
          type: ["string", "null"]

    VendorDetail:
      type: object
      required: [id, businessName, area, cuisineType, coverImage, rating, subscriberCount, description, plans, meals]
      properties:
        id:
          type: integer
        businessName:
          type: string
        area:
          type: string
        cuisineType:
          type: string
        coverImage:
          type: string
        rating:
          type: number
        subscriberCount:
          type: integer
        description:
          type: string
        plans:
          type: array
          items:
            $ref: "#/components/schemas/SubscriptionPlan"
        meals:
          type: array
          items:
            $ref: "#/components/schemas/Meal"

    SubscriptionPlan:
      type: object
      required: [id, name, daysPerMonth, freeDays, priceNaira, includesDelivery]
      properties:
        id:
          type: integer
        name:
          type: string
        daysPerMonth:
          type: integer
        freeDays:
          type: integer
        priceNaira:
          type: integer
        includesDelivery:
          type: boolean

    Meal:
      type: object
      required: [id, name, description, priceNaira, imageUrl, available]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        priceNaira:
          type: integer
        imageUrl:
          type: string
        available:
          type: boolean
        category:
          type: ["string", "null"]

    # ── User ─────────────────────────────────────────────────────────────
    UserProfile:
      type: object
      required: [id, name, email, phone, area]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        area:
          type: string

    UserProfileUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        area:
          type: string

    UserSubscription:
      type: object
      required: [id, vendorId, vendorName, planName, daysPerMonth, freeDays, priceNaira, startDate, status]
      properties:
        id:
          type: integer
        vendorId:
          type: integer
        vendorName:
          type: string
        vendorCoverImage:
          type: ["string", "null"]
        planName:
          type: string
        daysPerMonth:
          type: integer
        freeDays:
          type: integer
        priceNaira:
          type: integer
        startDate:
          type: string
          format: date
        status:
          type: string
          enum: [active, paused, cancelled]

    SubscriptionInput:
      type: object
      required: [vendorId, planId]
      properties:
        vendorId:
          type: integer
        planId:
          type: integer

    # ── Vendor dashboard ──────────────────────────────────────────────────
    VendorProfile:
      type: object
      required: [id, businessName, ownerName, email, phone, area, cuisineType]
      properties:
        id:
          type: integer
        businessName:
          type: string
        ownerName:
          type: string
        email:
          type: string
        phone:
          type: string
        area:
          type: string
        cuisineType:
          type: string
        description:
          type: ["string", "null"]
        coverImage:
          type: ["string", "null"]

    VendorProfileUpdate:
      type: object
      properties:
        businessName:
          type: string
        ownerName:
          type: string
        phone:
