openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Chop Plan API - prepaid lunch subscription service for Lagos restaurants
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication for users and vendors
  - name: vendors
    description: Vendor browsing for users
  - name: user
    description: User profile and subscriptions
  - name: vendor
    description: Vendor dashboard and management
  - name: blog
    description: Blog posts
  - name: contact
    description: Contact form
  - name: leads
    description: Marketing lead capture
  - name: admin
    description: Admin dashboard - manage vendors, customers and view analytics
  - name: Storage
    description: Object storage upload and serving endpoints.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── AUTH ──────────────────────────────────────────────────────────────────
  /auth/user/signup:
    post:
      operationId: userSignup
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSignupInput"
      responses:
        "201":
          description: Created, verification code sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignupResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/user/login:
    post:
      operationId: userLogin
      tags: [auth]
      summary: Login as a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Account not verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnverifiedResponse"

  /auth/user/verify:
    post:
      operationId: userVerify
      tags: [auth]
      summary: Verify a user's signup OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyInput"
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid or expired code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/user/resend-otp:
    post:
      operationId: userResendOtp
      tags: [auth]
      summary: Resend a user's signup verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendOtpInput"
      responses:
        "200":
          description: Code resent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Already verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/user/forgot-password:
    post:
      operationId: userForgotPassword
      tags: [auth]
      summary: Request a password reset code for a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: Reset code sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/user/reset-password:
    post:
      operationId: userResetPassword
      tags: [auth]
      summary: Reset a user's password with a reset code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid or expired code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/vendor/signup:
    post:
      operationId: vendorSignup
      tags: [auth]
      summary: Register a new vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorSignupInput"
      responses:
        "201":
          description: Created, verification code sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignupResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/vendor/login:
    post:
      operationId: vendorLogin
      tags: [auth]
      summary: Login as a vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Account not verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnverifiedResponse"

  /auth/vendor/verify:
    post:
      operationId: vendorVerify
      tags: [auth]
      summary: Verify a vendor's signup OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyInput"
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid or expired code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/vendor/resend-otp:
    post:
      operationId: vendorResendOtp
      tags: [auth]
      summary: Resend a vendor's signup verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendOtpInput"
      responses:
        "200":
          description: Code resent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Already verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/vendor/forgot-password:
    post:
      operationId: vendorForgotPassword
      tags: [auth]
      summary: Request a password reset code for a vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: Reset code sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/vendor/reset-password:
    post:
      operationId: vendorResetPassword
      tags: [auth]
      summary: Reset a vendor's password with a reset code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid or expired code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/admin/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Login as an admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user or vendor
      responses:
        "200":
          description: Current session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── VENDORS (public browsing) ─────────────────────────────────────────────
  /vendors:
    get:
      operationId: listVendors
      tags: [vendors]
      summary: List all vendors, optionally filtered by area/location
      parameters:
        - name: area
          in: query
          schema:
            type: string
          description: Lagos area/neighborhood filter (e.g. Lekki, VI, Ikeja)
        - name: search
          in: query
          schema:
            type: string
          description: Search by vendor name or cuisine
      responses:
        "200":
          description: List of vendors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"

  /vendors/{vendorId}:
    get:
      operationId: getVendor
      tags: [vendors]
      summary: Get a single vendor profile
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vendor detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vendors/{vendorId}/meals:
    get:
      operationId: listVendorMeals
      tags: [vendors]
      summary: Get meals offered by a vendor
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of meals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicMeal"

  /vendors/{vendorId}/plans:
    get:
      operationId: listVendorPlans
      tags: [vendors]
      summary: Get subscription plans for a vendor
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Basic and/or Premium plan, each optional
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicVendorPlans"

  /vendors/areas:
    get:
      operationId: listAreas
      tags: [vendors]
      summary: List all Lagos areas that have vendors
      responses:
        "200":
          description: Unique area list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  # ── USER dashboard ────────────────────────────────────────────────────────
  /user/profile:
    get:
      operationId: getUserProfile
      tags: [user]
      summary: Get logged-in user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateUserProfile
      tags: [user]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /user/subscriptions:
    get:
      operationId: listUserSubscriptions
      tags: [user]
      summary: Get the user's active subscriptions
      responses:
        "200":
          description: Subscriptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserSubscription"
  /user/subscriptions/checkout:
    post:
      operationId: checkoutSubscription
      tags: [user]
      summary: Start a Paystack checkout for a vendor plan
      description: >
        Initiates a real Paystack payment for the customer-facing price.
        No subscription is created yet — it only activates once Paystack
        confirms the charge succeeded. Redirect the customer to
        authorizationUrl to complete payment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutInput"
      responses:
        "201":
          description: Checkout started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Vendor or plan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Paystack error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/payments/{reference}/verify:
    get:
      operationId: verifyPayment
      tags: [user]
      summary: Verify a Paystack payment and activate its subscription if successful
      description: >
        Fallback for the checkout callback screen. Independently confirms
        the transaction's status directly with Paystack and activates the
        subscription if needed — safe to call even if the webhook has
        already processed it.
      parameters:
        - name: reference
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentStatus"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Paystack error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/subscriptions/{subscriptionId}:
    delete:
      operationId: cancelSubscription
      tags: [user]
      summary: Cancel a subscription
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /user/subscriptions/{subscriptionId}/schedule:
    get:
      operationId: getUserSubscriptionSchedule
      tags: [user]
      summary: Get the daily pickup schedule for a subscription
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Schedule days
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduleDay"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/subscriptions/{subscriptionId}/schedule/{dayId}/confirm:
    post:
      operationId: confirmPickup
      tags: [user]
      summary: Confirm a day's pickup was received
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: integer
        - name: dayId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleDay"
        "400":
          description: Cannot confirm this day
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/alacarte/checkout:
    post:
      operationId: checkoutAlacarte
      tags: [user]
      summary: Start a Paystack checkout for an off-schedule, à la carte meal
      description: >
        No active subscription is required. Always priced from the meal's
        raw vendor price at the (higher) off-schedule markup rate — the
        server rejects the purchase if the customer already has a
        subscription pickup scheduled at this vendor today.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlacarteCheckoutInput"
      responses:
        "201":
          description: Checkout started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlacarteCheckoutResponse"
        "400":
          description: Validation error, or today is on-schedule at this vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Vendor or meal not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Paystack error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/alacarte/orders:
    get:
      operationId: listAlacarteOrders
      tags: [user]
      summary: Get the user's à la carte order history
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AlacarteOrder"

  /user/alacarte/{paymentId}/confirm:
    post:
      operationId: confirmAlacartePickup
      tags: [user]
      summary: Confirm an à la carte order's pickup was received
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlacarteOrderConfirmation"
        "400":
          description: Cannot confirm this order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /user/notifications:
    get:
      operationId: listUserOrderNotifications
      tags: [user]
      summary: Get pickup-notification history for one of the user's own orders
      parameters:
        - name: orderType
          in: query
          required: true
          schema:
            type: string
            enum: [subscription, alacarte]
        - name: subscriptionDayId
          in: query
          schema:
            type: integer
          description: Required when orderType is "subscription"
        - name: paymentId
          in: query
          schema:
            type: integer
          description: Required when orderType is "alacarte"
      responses:
        "200":
          description: Notification history, most recent first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderNotification"
        "400":
          description: Missing/invalid query params
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── VENDOR dashboard ──────────────────────────────────────────────────────
  # ── STORAGE ───────────────────────────────────────────────────────────────
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
        Vendor-only for now (Kitchen Profile and menu photo uploads).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing/invalid fields, file too large, or not an image.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated as a vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vendor/profile:
    get:
      operationId: getVendorProfile
      tags: [vendor]
      summary: Get logged-in vendor profile
      responses:
        "200":
          description: Vendor profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorProfile"
    patch:
      operationId: updateVendorProfile
      tags: [vendor]
      summary: Update vendor profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorProfileUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorProfile"

  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      description: |
        Unconditionally public — no authentication or ACL checks.
        Searches PUBLIC_OBJECT_SEARCH_PATHS for the given file path.
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
          description: Relative file path within the public search paths.
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: File not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to serve public object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      description: |
        Serves kitchen/menu photos uploaded via presigned URLs. Served
        unauthenticated since these become customer-facing once saved.
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
          description: Object path within the private object dir (e.g. `uploads/some-uuid`).
      responses:
        "200":
          description: Object content streamed with correct Content-Type.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Object not found.
          content:
            application/json:
              schema:
