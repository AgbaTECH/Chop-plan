components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    # ── Storage ───────────────────────────────────────────────────────────
    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. `image/jpeg`).
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`). Store this in your database.
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"

    # ── Auth ──────────────────────────────────────────────────────────────
    UserSignupInput:
      type: object
      required: [name, email, password, phone, area]
      properties:
        name:
          type: string
        email:
          type: string

        password:
          type: string
          minLength: 6
        phone:
          type: string
        area:
          type: string
          description: Lagos area/neighborhood

    VendorSignupInput:
      type: object
      required: [businessName, ownerName, email, password, phone, area, cuisineType]
      properties:
        businessName:
          type: string
        ownerName:
          type: string
        email:
          type: string

        password:
          type: string
          minLength: 6
        phone:
          type: string
        area:
          type: string
        cuisineType:
          type: string
        description:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string

        password:
          type: string

    AuthResponse:
      type: object
      required: [token, role, id, name, email]
      properties:
        token:
          type: string
        role:
          type: string
          enum: [user, vendor, admin]
        id:
          type: integer
        name:
          type: string
        email:
          type: string

    SignupResponse:
      type: object
      required: [requiresVerification, email, message]
      properties:
        requiresVerification:
          type: boolean
        email:
          type: string
        message:
          type: string

    UnverifiedResponse:
      type: object
      required: [error, requiresVerification, email]
      properties:
        error:
          type: string
        requiresVerification:
          type: boolean
        email:
          type: string

    VerifyInput:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
        code:
          type: string

    ResendOtpInput:
      type: object
      required: [email]
      properties:
        email:
          type: string

    ForgotPasswordInput:
      type: object
      required: [email]
      properties:
        email:
          type: string

    ResetPasswordInput:
      type: object
      required: [email, code, newPassword]
      properties:
        email:
          type: string
        code:
          type: string
        newPassword:
          type: string
          minLength: 6

    MeResponse:
      type: object
      required: [id, name, email, role]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, vendor, admin]
        area:
          type: ["string", "null"]

    # ── Vendors (public) ──────────────────────────────────────────────────
    Vendor:
      type: object
      required: [id, businessName, area, cuisineType, coverImage, rating, subscriberCount, lowestPlanPrice]
      properties:
        id:
          type: integer
        businessName:
          type: string
        area:
          type: string
        cuisineType:
          type: string
        coverImage:
          type: string
        rating:
          type: number
        subscriberCount:
          type: integer
        lowestPlanPrice:
          type: integer
          description: Lowest monthly plan price in Naira
        description:
          type: ["string", "null"]

    VendorDetail:
      type: object
      required: [id, businessName, area, cuisineType, coverImage, kitchenPhotos, rating, subscriberCount, description, plans, meals]
      properties:
        id:
          type: integer
        businessName:
          type: string
        area:
          type: string
        cuisineType:
          type: string
        coverImage:
          type: string
        kitchenPhotos:
          type: array
          items:
            type: string
          description: Additional kitchen photos beyond the cover image, shown on the vendor's public profile.
        rating:
          type: number
        subscriberCount:
          type: integer
        description:
          type: string
        plans:
          $ref: "#/components/schemas/PublicVendorPlans"
        meals:
          type: array
          items:
            $ref: "#/components/schemas/PublicMeal"

    PublicMeal:
      type: object
      required: [id, name, description, priceNaira, offSchedulePriceNaira, imageUrl, available]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        priceNaira:
          type: integer
        offSchedulePriceNaira:
          type: integer
          description: >
            The higher, off-schedule ("à la carte") price for buying this
            meal directly with no active subscription, on a day outside the
            customer's plan schedule. Always strictly greater than
            priceNaira.
        imageUrl:
          type: string
        available:
          type: boolean
        category:
          type: ["string", "null"]

    PlanMenuItem:
      type: object
      required: [id, name, description, imageUrl, category]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        category:
          type: ["string", "null"]

    # ── Public (pre-subscription) plan shapes ──────────────────────────────
    PublicBasicPlan:
      type: object
      required: [id, priceNaira, daysPerMonth, freeDays, meal]
      properties:
        id:
          type: integer
        priceNaira:
          type: integer
        daysPerMonth:
          type: integer
        freeDays:
          type: integer
        meal:
          $ref: "#/components/schemas/PlanMenuItem"

    PublicTimetableDay:
      type: object
      required: [dayOfWeek, meal]
      properties:
        dayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
        meal:
          $ref: "#/components/schemas/PlanMenuItem"

    PublicPremiumPlan:
      type: object
      required: [id, priceNaira, daysPerMonth, freeDays, rotation, freeDay]
      properties:
        id:
          type: integer
        priceNaira:
          type: integer
        daysPerMonth:
          type: integer
        freeDays:
          type: integer
        rotation:
          type: array
          items:
            $ref: "#/components/schemas/PublicTimetableDay"
        freeDay:
          $ref: "#/components/schemas/PublicTimetableDay"

    PublicVendorPlans:
      type: object
      properties:
        basic:
          oneOf:
            - $ref: "#/components/schemas/PublicBasicPlan"
            - type: "null"
        premium:
          oneOf:
            - $ref: "#/components/schemas/PublicPremiumPlan"
            - type: "null"

